<!DOCTYPE html>
<html lang="zh-TW">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>博士助聽器2026高齡健康產業博覽會</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Noto Sans TC',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#f5f6fb;
color:#333;
overflow-x:hidden;
}

/* ================= HEADER ================= */

header{
position:fixed;
top:0;
left:0;
width:100%;
height:70px;
background:rgba(255,255,255,.75);
backdrop-filter:blur(15px);
display:flex;
align-items:center;
padding:0 40px;
z-index:999;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

/* LOGO 區塊（圖片） */
.logo img{
height:42px;
object-fit:contain;
}

/* ================= HERO ================= */

.hero{
margin-top:70px;
width:100%;
}

.banner{
width:100%;
display:flex;
justify-content:center;
align-items:center;
padding:30px 15px;
opacity:0;
transform:translateY(80px);
transition:1s;
}

.banner.show{
opacity:1;
transform:translateY(0);
}

.banner img{
width:100%;
max-width:700px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,.15);
transition:.4s;
}

.banner img:hover{
transform:scale(1.02);
}

/* ================= TITLE ================= */

.section-title{
text-align:center;
font-size:40px;
font-weight:700;
margin:80px 0 50px;
}

/* ================= FORM ================= */

.form-section{
width:100%;
padding:80px 20px;
background:white;
}

.form-box{
max-width:700px;
margin:auto;
padding:50px;
border-radius:25px;
background:#fff;
box-shadow:0 20px 60px rgba(0,0,0,.08);
}

.form-box h2{
text-align:center;
margin-bottom:35px;
font-size:36px;
}

.input-group{
margin-bottom:25px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

.input-group input,
.input-group select,
.input-group textarea{
width:100%;
padding:16px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
outline:none;
transition:.3s;
}

.input-group input:focus,
.input-group textarea:focus,
.input-group select:focus{
border-color:#d4af37;
box-shadow:0 0 8px rgba(212,175,55,.25);
}
  .btn-group{
display:flex;
gap:20px;
margin-top:35px;
flex-wrap:wrap;
}

/* 送出按鈕（第三份紅色強CTA） */
.submit-btn{
flex:1;
padding:18px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
color:#fff;
background:#ff2d2d;
box-shadow:0 10px 25px rgba(255,45,45,.3);
transition:.3s;
}

.submit-btn:hover{
background:#e60000;
transform:translateY(-3px);
}

/* LINE按鈕維持品牌色 */
.line-btn{
flex:1;
padding:18px;
border-radius:12px;
font-size:18px;
font-weight:bold;
background:#06C755;
color:white;
text-decoration:none;
display:flex;
justify-content:center;
align-items:center;
transition:.3s;
}

.line-btn:hover{
background:#00b84f;
transform:translateY(-3px);
}

/* FOOTER */

footer{
padding:40px;
text-align:center;
color:#777;
font-size:14px;
background:#fafafa;
}

/* RWD */

@media(max-width:768px){

header{
padding:0 20px;
height:60px;
}

.form-box{
padding:30px 22px;
}

.btn-group{
flex-direction:column;
}

}
</style>

</head>

<body>
  <header>

<div class="logo">
<img src="https://www.drhearing.com.tw/Templates/TEZ_112094/images/all/logo.svg" alt="logo">
</div>

</header>

<section class="hero">

<div class="banner" id="banner1">
<a href="https://www.drhearing.com.tw/page/news/show.aspx?num=1183&page=1&lang=TW" target="_blank">
<img src="https://images.unsplash.com/photo-1536627586881-23313f2514ac?w=700&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1yZWxhdGVkfDF8fHxlbnwwfHx8fHw%3D">
  </a>
</div>

<div class="banner">
  <a href="https://www.drhearing.com.tw/page/news/show.aspx?num=1183&page=1&lang=TW" target="_blank">
<img src="https://images.unsplash.com/photo-1536627554051-41202c7fd9a1?q=80&w=1288&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
    </a>
</div>

<div class="banner">
  <a href="https://www.drhearing.com.tw/page/news/show.aspx?num=1183&page=1&lang=TW" target="_blank">
<img src="https://images.unsplash.com/photo-1668675371855-8843452cab4c?q=80&w=1315&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
    </a>
</div>

<div class="banner">
  <a href="https://www.drhearing.com.tw/page/news/show.aspx?num=1183&page=1&lang=TW" target="_blank">
<img src="https://images.unsplash.com/photo-1640093651319-5e2c469e488f?q=80&w=1287&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
    </a>
</div>

<div class="banner">
  <a href="https://www.drhearing.com.tw/page/news/show.aspx?num=1183&page=1&lang=TW" target="_blank">
<img src="https://images.unsplash.com/photo-1575403071524-8bad9be06578?q=80&w=1288&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
    </a>
</div>

</section>

<section class="form-section">

<div class="form-box">

<h2>立即報名</h2>

<form id="signupForm">

<div class="input-group">
<label>姓名</label>
<input type="text" id="name">
</div>

<div class="input-group">
<label>手機</label>
<input type="tel" id="phone">
</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="email">
</div>

<div class="input-group">
<label>地區</label>
<select id="city">
<option value="">請選擇</option>
<option>台北</option>
<option>台中</option>
<option>高雄</option>
</select>
</div>

<div class="input-group">
<label>留言</label>
<textarea id="message"></textarea>
</div>

<div class="btn-group">

<button type="submit" class="submit-btn">
填寫完成
</button>

<a class="line-btn" href="https://lin.ee/JpYZzG8" target="_blank">
LINE 加好友
</a>

</div>

</form>

</div>

</section>

<footer>
© 2026 Copyright｜Dr.Hearing Group All Rights Reserved.
</footer>

<script>

// banner animation
const banners = document.querySelectorAll(".banner");

function show(){
const trigger = window.innerHeight * 0.85;

banners.forEach(b=>{
if(b.getBoundingClientRect().top < trigger){
b.classList.add("show");
}
});
}

window.addEventListener("scroll",show);
window.addEventListener("load",show);


// form validation

document.getElementById("signupForm").addEventListener("submit",function(e){

e.preventDefault();

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;

if(name==""||phone==""){
alert("請填寫完整資料");
return;
}

alert("報名成功！");
this.reset();

});

</script>

</body>
</html>
