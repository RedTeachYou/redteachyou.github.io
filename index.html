<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>每日經文 | Bible Verse</title>

<meta name="description" content="每日隨機閱讀聖經經文，安靜你的心靈。">

<meta name="theme-color" content="#0b0b0b">


<!-- PWA -->
<link rel="manifest" href="manifest.json">


<!-- 字體 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet">


<!-- CSS -->
<link rel="stylesheet" href="style.css">


</head>


<body>


<!-- Loading -->

<div class="loading-screen" id="loading">

    <div class="loading-cross">
        ✝
    </div>

    <p>
        準備今日經文...
    </p>

</div>




<!-- 主容器 -->

<main class="app">


    <!-- 頂部 -->

    <header class="header">


        <div class="brand">

            <span class="brand-icon">
                📖
            </span>

            <span>
                每日經文
            </span>

        </div>



        <div class="date-area">

            <div id="todayDate">
                2026年7月16日
            </div>

            <div class="reading-count">

                今日閱讀

                <span id="count">
                    0
                </span>

            </div>

        </div>



    </header>






    <!-- 經文閱讀區 -->


    <section class="scripture-wrapper">



        <div class="book-shadow"></div>


        <article class="scripture-card" id="verseCard">


            <div class="chapter-mark">

                <span>
                    今日靈修
                </span>

            </div>



            <div class="verse-content">


                <p id="verseText">

                    神愛世人，甚至將他的獨生子賜給他們，
                    叫一切信他的，不至滅亡，反得永生。

                </p>



                <div class="verse-reference">


                    <span id="verseBook">

                        約翰福音

                    </span>


                    <span>

                        ·

                    </span>


                    <span id="verseChapter">

                        3:16

                    </span>



                </div>


            </div>



        </article>



    </section>







    <!-- 操作區 -->


    <section class="actions">



        <button 
        class="action-button secondary"
        id="favoriteBtn">


            <span>
                ♡
            </span>

            收藏


        </button>





        <button 
        class="action-button primary"
        id="nextBtn">


            下一節

            <span>
                → 
            </span>


        </button>





        <button 
        class="action-button secondary"
        id="shareBtn">


            <span>
                ↗
            </span>

            分享


        </button>




    </section>








    <!-- 提示 -->


    <div class="hint">

        點擊「下一節」閱讀新的今日經文

    </div>





</main>








<!-- Toast -->


<div class="toast" id="toast">

    已收藏

</div>







<!-- JavaScript -->


<script src="script.js"></script>



</body>

</html>
